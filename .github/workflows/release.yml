name: Release

on:
  push:
    tags: ['v*']

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build all
        run: make all VERSION=${{ steps.version.outputs.version }}

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware-uf2
          path: build/firmware/zephyr.uf2
          if-no-files-found: error

      - name: Upload middleware artifact
        uses: actions/upload-artifact@v4
        with:
          name: middleware-linux-x86_64
          path: build/middleware/fancypants
          if-no-files-found: error

  release:
    name: Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download firmware
        uses: actions/download-artifact@v4
        with:
          name: firmware-uf2

      - name: Download middleware
        uses: actions/download-artifact@v4
        with:
          name: middleware-linux-x86_64

      - name: Rename artifacts
        run: |
          mv zephyr.uf2 fancypants-${{ github.ref_name }}-firmware.uf2
          mv fancypants fancypants-${{ github.ref_name }}-linux-x86_64
          chmod +x fancypants-${{ github.ref_name }}-linux-x86_64

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            fancypants-${{ github.ref_name }}-firmware.uf2
            fancypants-${{ github.ref_name }}-linux-x86_64
          generate_release_notes: true
